name: CI

on:
  push:
    branches: [main, master, staging, release/*]
  pull_request:
    branches: [main, master, staging]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate infrastructure source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npx tsc --noEmit
